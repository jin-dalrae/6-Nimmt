# Cloudflare Pages — https://nimmt6.pages.dev
# Realtime is proxied to Worker "sfboardgames" (Durable Objects live there).
name = "nimmt6"
pages_build_output_dir = "./dist/pages-out"
compatibility_date = "2025-02-04"
compatibility_flags = ["nodejs_compat"]

[[services]]
binding = "GAME"
service = "sfboardgames"
